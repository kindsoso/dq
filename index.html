  return '#a8d8ba';
}

// ===== Init ECharts =====
const chart = echarts.init(document.getElementById('map'));
fetch('https://geo.datav.aliyun.com/areas_v3/bound/370000_full.json')
  .then(r=>r.json())
  .then(sd=>{
    echarts.registerMap('山东', sd);
    const md = CITY_NAMES.map(c => {
      const plan = ALL_CITIES[c].reduce((s,sc)=>s+(sc.plan||0),0);
      return {name: REV_MAP[c]||c, value: plan, label: {color: plan>=600?'#fff':'#333'}};
    });
    chart.setOption({
      tooltip: {
        trigger: 'item',
        formatter: p => {
          const ck = NAME_MAP[p.name]||p.name;
          const a = ALL_CITIES[ck];
          if(!a) return '<b>'+p.name+'</b><br/>暂无数据';
          const cnt=a.length, plan=a.reduce((s,sc)=>s+(sc.plan||0),0);
          const lvs = {};
          a.forEach(sc => { lvs[sc.level] = (lvs[sc.level]||0)+1; });
          let lvStr = Object.keys(lvs).map(k => k+'×'+lvs[k]).join(' ');
          return `<b style="font-size:15px">${ck}</b><br/>院校数：${cnt}所 · 计划：${plan}人<br/>${lvStr}`;
        }
      },
      visualMap: {
        show: false,
        pieces: [
          { min: 900, color: '#072f1a' },
          { min: 600, max: 899, color: '#0d4f2b' },
          { min: 400, max: 599, color: '#1a6b3c' },
          { min: 300, max: 399, color: '#2d8f52' },
          { min: 200, max: 299, color: '#52b576' },
          { min: 100, max: 199, color: '#8fd4a8' },
          { max: 99, color: '#ddd' }
        ]
      },
      series: [{
        type:'map', map:'山东', roam:true, selectedMode:false,
        label: { show:true, fontSize:11 },
        emphasis: { label:{fontSize:14,fontWeight:'bold',color:'#1a3a5c'}, itemStyle:{areaColor:'#2d6a9f',borderColor:'#fff',borderWidth:2} },
        itemStyle: { areaColor:'#e8ecf0', borderColor:'#fff', borderWidth:1 },
        data: md
      }]
    });
    chart.on('mouseover', p => updateDetail(NAME_MAP[p.name]||p.name));
    chart.on('click', p => updateDetail(NAME_MAP[p.name]||p.name));
    // Default
    updateDetail('济南');
  })
  .catch(()=>{
    document.getElementById('map').innerHTML = '<div style="padding:100px;text-align:center;color:#999">地图加载失败，请检查网络或刷新重试</div>';
  });

// ===== Update detail panel =====
function updateDetail(ck) {
  const schools = ALL_CITIES[ck];
  if(!schools) return;
  const cnt = schools.length, plan = schools.reduce((s,sc)=>s+(sc.plan||0),0);
  document.getElementById('cityName').textContent = '📍 '+ck;
  document.getElementById('cityStat').textContent = cnt+'所院校 · 计划招生 '+plan+' 人';

  const LVL_LABEL = {'高风险':'高风险','冲':'冲','冲(新)':'冲','稳':'稳','稳(新)':'稳','保':'保','保(新)':'保','垫底':'垫底','垫底(新)':'垫底','新(参考预测)':'新专业','待定':'待定','未知':'未知'};
  const LVL_COL = {'高风险':'#d32f2f','冲':'#f57c00','冲(新)':'#f57c00','稳':'#388e3c','稳(新)':'#388e3c','保':'#1976d2','保(新)':'#1976d2','垫底':'#7b1fa2','垫底(新)':'#7b1fa2','新(参考预测)':'#f57f17','待定':'#999','未知':'#999'};

  let html = '';
  schools.forEach(sc => {
    const lvl = sc.level, lc = LVL_COL[lvl]||'#999';
    const ll = LVL_LABEL[lvl]||lvl;
    const pred = sc.pred ? sc.pred+'分' : '-';
    const fee = sc.fee ? sc.fee+'元/年' : '-';
    const subject = sc.subject || '-';

    // Score table
    function v25(v){ return v!==null && v!==undefined ? sc.scores['25'] : null; }
    function rankFmt(v){ return v ? v.toLocaleString() : '<span class="muted">-</span>'; }
    function enrollFmt(v){ return v!==null&&v!==undefined ? v : '<span class="muted">-</span>'; }

    const eq25 = sc.eq_scores ? sc.eq_scores['25'] : null;
    const eq24 = sc.eq_scores ? sc.eq_scores['24'] : null;
    const eq23 = sc.eq_scores ? sc.eq_scores['23'] : null;
    const s25 = sc.score_points['25'] ? sc.score_points['25']+'分' : '-';
    const s24 = sc.score_points['24'] ? sc.score_points['24']+'分' : '-';
    const s23 = sc.score_points['23'] ? sc.score_points['23']+'分' : '-';
    const r25 = sc.scores['25'];
    const r24 = sc.scores['24'];
    const r23 = sc.scores['23'];
    const e25 = sc.enroll['25'];
    const e24 = sc.enroll['24'];
    const e23 = sc.enroll['23'];

    const isNew = sc.is_new || (!sc.scores['25']&&!sc.scores['24']&&!sc.scores['23']);
    const newTag = isNew ? '<span class="tag tag-new">🆕 新设专业</span>' : '';

    html += `<div class="school-card">
      <div class="level-badge" style="background:${lc}">${ll}</div>
      <div class="sc-name">${sc.name} <span class="sc-code">${sc.code}</span></div>
      <div class="sc-tags">
        <span class="tag tag-plan">📋 计划${sc.plan}人</span>
        <span class="tag tag-pred">🎯 预测${pred}</span>
        <span class="tag tag-fee">💰 ${fee}</span>
        <span class="tag tag-subject">📌 ${subject}</span>
        ${newTag}
      </div>
      <table class="sc-table">
        <tr>
          <th></th><th>等位分</th><th>投档分</th><th>最低位次</th><th>录取人数</th>
        </tr>
        <tr>
          <td><b>2025年</b></td>
          <td>${eq25 !== null ? eq25+'分' : '<span class="muted">-</span>'}</td>
          <td>${s25}</td>
          <td>${r25 ? r25.toLocaleString() : '<span class="muted">-</span>'}</td>
          <td>${e25!==null&&e25!==undefined ? e25 : '<span class="muted">-</span>'}</td>
        </tr>
        <tr>
          <td><b>2024年</b></td>
          <td>${eq24 !== null ? eq24+'分' : '<span class="muted">-</span>'}</td>
          <td>${s24}</td>
          <td>${r24 ? r24.toLocaleString() : '<span class="muted">-</span>'}</td>
          <td>${e24!==null&&e24!==undefined ? e24 : '<span class="muted">-</span>'}</td>
        </tr>
        <tr>
          <td><b>2023年</b></td>
          <td>${eq23 !== null ? eq23+'分' : '<span class="muted">-</span>'}</td>
          <td>${s23}</td>
          <td>${r23 ? r23.toLocaleString() : '<span class="muted">-</span>'}</td>
          <td>${e23!==null&&e23!==undefined ? e23 : '<span class="muted">-</span>'}</td>
        </tr>
      </table>
      ${sc.note ? `<div class="sc-note">📎 ${sc.note}</div>` : ''}
    </div>`;
  });
  document.getElementById('schoolList').innerHTML = html;
}
</script>
</body>
</html>
